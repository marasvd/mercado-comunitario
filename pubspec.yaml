name: mercados_comunitarios
description: "Sistema de gestión de mercados comunitarios para fundaciones sociales."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.0

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Router
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Imagen
  flutter_image_compress: ^2.4.0

  # Utilidades
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true